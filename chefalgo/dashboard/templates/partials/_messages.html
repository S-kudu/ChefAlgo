<!-- ERROR NOTIFICATION SYSTEM -->
{% if messages %}
<style>
    /* Tasarımı asla bozmayan, ekranın üzerinde yüzen yapı */
    .chef-alert-wrapper {
        position: fixed;
        top: 25px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10000;
        width: 100%;
        max-width: 500px;
        padding: 0 20px;
        pointer-events: none; /* Sayfa etkileşimini engellemez */
    }

    .chef-alert-box {
        pointer-events: auto;
        background: rgba(220, 38, 38, 0.15); /* Şeffaf kırmızı derinlik */
        backdrop-filter: blur(12px); /* Glassmorphism etkisi */
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid #ef4444; /* Canlı kırmızı sınır */
        border-radius: 12px;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        animation: alertSlideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes alertSlideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .alert-icon {
        color: #ef4444;
        font-size: 1.2rem;
        display: flex;
    }

    .alert-message {
        color: #ffffff;
        font-size: 0.95rem;
        font-weight: 500;
        margin: 0;
        letter-spacing: 0.3px;
    }

    /* Başarı mesajı gelirse otomatik yeşile döner */
    .chef-alert-box.success {
        background: rgba(16, 185, 129, 0.15);
        border-color: #10b981;
    }
    .chef-alert-box.success .alert-icon { color: #10b981; }
</style>

<div class="chef-alert-wrapper" id="alert-wrapper">
    {% for message in messages %}
    <div class="chef-alert-box {{ message.tags }}">
        <div class="alert-icon">
            {% if message.tags == 'success' %}
                <i class="bi bi-check-circle-fill"></i>
            {% else %}
                <i class="bi bi-exclamation-circle-fill"></i>
            {% endif %}
        </div>
        <p class="alert-message">{{ message }}</p>
    </div>
    {% endfor %}
</div>

<script>
    // 4 saniye sonra kutuyu nazikçe yok et
    setTimeout(() => {
        const wrapper = document.getElementById('alert-wrapper');
        if (wrapper) {
            wrapper.style.transition = "opacity 0.6s ease, transform 0.6s ease";
            wrapper.style.opacity = "0";
            wrapper.style.transform = "translate(-50%, -20px)";
            setTimeout(() => wrapper.remove(), 600);
        }
    }, 4000);
</script>
{% endif %}
