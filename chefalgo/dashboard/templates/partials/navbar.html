<nav class="navbar navbar-expand-lg fixed-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard:panel' %}">
            Chef<span>Algo</span>
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#chefNavbar" aria-controls="chefNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <i class="bi bi-list text-white fs-1" id="menuIcon"></i>
        </button>

        <div class="collapse navbar-collapse" id="chefNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                
                <li class="nav-item">
                    <a class="nav-link-custom" href="{% url 'accounts:home' %}">Ana Sayfa</a>
                </li>

                {% if user.is_authenticated %}
                    
                    <li class="nav-item d-none d-lg-block">
                        <span class="nav-link-custom text-white-50 cursor-default" style="cursor: default;">
                            Hoş geldin, <span class="text-success fw-bold">{{ user.first_name|default:user.username }}</span>
                        </span>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'dashboard:panel' %}" class="nav-link-custom">Panelim</a>
                    </li>
                    <li class="nav-item mt-3 mt-lg-0 ms-lg-3">
                        <a href="{% url 'accounts:logout' %}" class="btn btn-outline-danger btn-sm rounded-pill px-4 py-2 w-100 text-center" style="font-weight: 600;">
                            <i class="bi bi-box-arrow-right me-1"></i> Çıkış Yap
                        </a>
                    </li>

                {% else %}
                    
                    <li class="nav-item">
                        <a href="{% url 'accounts:login' %}" class="nav-link-custom me-lg-4">Giriş Yap</a>
                    </li>
                    <li class="nav-item mt-3 mt-lg-0">
                        <a href="{% url 'accounts:register' %}" class="btn-cta w-100 text-center px-4">Hemen Başla</a>
                    </li>
                    
                {% endif %}
                
            </ul>
        </div>
    </div>
</nav>

<script>
    const navbarToggler = document.querySelector('.navbar-toggler');
    const menuIcon = document.getElementById('menuIcon');

    navbarToggler.addEventListener('click', function() {
        if (menuIcon.classList.contains('bi-list')) {
            menuIcon.classList.remove('bi-list');
            menuIcon.classList.add('bi-x');
        } else {
            menuIcon.classList.remove('bi-x');
            menuIcon.classList.add('bi-list');
        }
    });
</script>
