<nav class="navbar navbar-expand-lg fixed-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            Chef<span>Algo</span>
        </a>

        <button class="navbar-toggler border-0 shadow-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#chefNavbar"
                aria-controls="chefNavbar"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <i class="bi bi-list fs-1" id="menuIcon"></i>
        </button>

        <div class="collapse navbar-collapse" id="chefNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item">
                    <a class="nav-link-custom" href="{% url 'home' %}">Ana Sayfa</a>
                </li>

                {% if user.is_authenticated %}
                    <li class="nav-item d-none d-lg-block">
                        <span class="nav-link-custom welcome-text" style="cursor: default;">
                            Hoş geldin,
                            <span class="welcome-name">
                                {{ user.first_name|default:user.username }}
                            </span>
                        </span>
                    </li>

                    <li class="nav-item">
                        {% if request.path != '/panel/' %}
                            <a href="{% url 'dashboard' %}" class="nav-link-custom">Panelim</a>
                        {% endif %}
                    </li>

                    <li class="nav-item">
                        <a href="{% url 'favorites_page' %}" class="nav-link-custom">
                           Favorilerim
                        </a>
                    </li>

                    <li class="nav-item mt-3 mt-lg-0 ms-lg-3">
                        <a href="{% url 'logout' %}"
                           class="btn btn-outline-danger btn-sm rounded-pill px-4 py-2 w-100 text-center fw-semibold">
                            <i class="bi bi-box-arrow-right me-1"></i>
                            Çıkış Yap
                        </a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a href="{% url 'login' %}" class="nav-link-custom me-lg-4">Giriş Yap</a>
                    </li>

                    <li class="nav-item mt-3 mt-lg-0">
                        <a href="{% url 'register' %}" class="btn-cta w-100 text-center px-4">Hemen Başla</a>
                    </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>

<script>
    const navbarToggler = document.querySelector('.navbar-toggler');
    const menuIcon = document.getElementById('menuIcon');

    if (navbarToggler && menuIcon) {
        navbarToggler.addEventListener('click', function () {
            menuIcon.classList.toggle('bi-list');
            menuIcon.classList.toggle('bi-x');
        });
    }
</script>
